services:
  frontoffice:
    build:
      context: ./frontoffice
      dockerfile: Dockerfile
    container_name: tp_iran_frontoffice
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: guerre_iran
      DB_USER: app
      DB_PASSWORD: app_password
    depends_on:
      - db
    volumes:
      - articles_images:/var/www/html/public/assets/images/articles

  backoffice:
    build:
      context: ./backoffice
      dockerfile: Dockerfile
    container_name: tp_iran_backoffice
    ports:
      - "8081:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: guerre_iran
      DB_USER: app
      DB_PASSWORD: app_password
      TINYMCE_API_KEY: ${TINYMCE_API_KEY}
    depends_on:
      - db
    volumes:
      - articles_images:/var/www/html/public/assets/images/articles

  db:
    image: mysql:8.0
    container_name: tp_iran_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: guerre_iran
      MYSQL_USER: app
      MYSQL_PASSWORD: app_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  db_data:
  articles_images:
